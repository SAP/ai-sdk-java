name: "Build Local Javadocs"
on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string

env:
  JAVA_VERSION: 21
  MAVEN_CACHE_KEY: maven-dependencies
  MAVEN_CACHE_DIR: ~/.m2

jobs:

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}
    steps:

      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ inputs.branch }}

      - name: "Setup Java"
        uses: actions/setup-java@v5
        with:
          distribution: "sapmachine"
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: "Restore Dependencies"
        uses: actions/cache/restore@v5
        with:
          key: ${{ env.MAVEN_CACHE_KEY }}
          path: ${{ env.MAVEN_CACHE_DIR }}

      - name: "Build SDK and generate aggregate options file"
        run: |
          mvn -B -ntp -Dstyle.color=never -Drelease -DskipTests -Dmaven.javadoc.failOnError=false -Dgpg.skip=true \
            clean install

          # aggregate-no-fork across full reactor writes options/packages to target/reports/apidocs
          # Lombok errors on child modules are expected (failOnError=false); the root options file
          # is written first and survives regardless, giving us the combined classpath and flags.
          mvn -B -ntp -Dstyle.color=never -Drelease -Dmaven.javadoc.failOnError=false -Dgpg.skip=true \
            javadoc:aggregate-no-fork

          if [[ ! -f target/reports/apidocs/options || ! -f target/reports/apidocs/packages ]]; then
            echo "Missing aggregate javadoc argument files in target/reports/apidocs" >&2
            exit 1
          fi
          echo "Aggregate options/packages files generated"

      - name: "Generate per-module and combined Javadocs from delomboked sources"
        run: |
          JAVADOC="$JAVA_HOME/bin/javadoc"
          OPTIONS="target/reports/apidocs/options"
          ALL_PACKAGES="target/reports/apidocs/packages"

          module_paths=(
            "core"
            "orchestration"
            "core-services/document-grounding"
            "core-services/prompt-registry"
            "foundation-models/openai"
            "foundation-models/sap-rpt"
          )

          patch_and_run() {
            local sourcepath="$1"
            local destdir="$2"
            local packages_file="$3"
            local patched="${OPTIONS}.patched"

            awk -v sp="$sourcepath" -v dd="$destdir" '
              BEGIN { skip_next=0 }
              {
                if (skip_next) { skip_next=0; next }
                if ($0 == "-sourcepath") { print; print "\047" sp "\047"; skip_next=1; next }
                if ($0 == "-d")          { print; print "\047" dd "\047"; skip_next=1; next }
                print
              }
            ' "$OPTIONS" > "$patched"

            grep -qF "$sourcepath" "$patched" || { echo "ERROR: sourcepath patch failed for $destdir" >&2; exit 1; }
            mkdir -p "$destdir"
            "$JAVADOC" @"$patched" @"$packages_file"
            rm -f "$patched"
          }

          # Per-module: derive packages list from that module's delombok sources only
          for module_path in "${module_paths[@]}"; do
            delombok_dir="$module_path/target/delombok"
            if [[ ! -d "$delombok_dir" ]]; then
              echo "Missing delombok sources for $module_path" >&2
              exit 1
            fi
            pkg_file="$module_path/target/javadoc-packages"
            find "$delombok_dir" -name "*.java" \
              | xargs grep -l "^package " \
              | xargs grep "^package " \
              | awk '{print $2}' | tr -d ';' | sort -u > "$pkg_file"
            echo "Generating javadoc for $module_path ..."
            patch_and_run "$delombok_dir" "$module_path/target/javadoc-delombok" "$pkg_file"
          done

          # Combined (parent): all modules' delombok dirs + original packages file
          combined_sourcepath=""
          for module_path in "${module_paths[@]}"; do
            [[ -z "$combined_sourcepath" ]] \
              && combined_sourcepath="$module_path/target/delombok" \
              || combined_sourcepath+=":$module_path/target/delombok"
          done
          echo "Generating combined javadoc for sdk-parent ..."
          patch_and_run "$combined_sourcepath" "target/javadoc-delombok" "$ALL_PACKAGES"

      - name: "Assemble local-javadocs output directory"
        run: |
          out_dir="target/local-javadocs"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"

          module_paths=(
            "core"
            "orchestration"
            "core-services/document-grounding"
            "core-services/prompt-registry"
            "foundation-models/openai"
            "foundation-models/sap-rpt"
          )

          module_names=(
            "AI Core client"
            "Orchestration client"
            "Document Grounding Client"
            "Prompt Registry client"
            "OpenAI client"
            "SAP RPT Model Client"
          )

          # Combined (parent) javadoc
          if [[ ! -f "target/javadoc-delombok/index.html" ]]; then
            echo "Missing combined javadocs at target/javadoc-delombok" >&2
            exit 1
          fi
          cp -R "target/javadoc-delombok" "$out_dir/aggregate"

          index_file="$out_dir/index.html"
          cat > "$index_file" <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <title>Local Javadocs</title>
          </head>
          <body>
            <h1>Local Javadocs</h1>
            <p><a href="aggregate/index.html">Aggregate API docs (all modules)</a></p>
            <ul>
          HTML

          for i in "${!module_paths[@]}"; do
            module_path="${module_paths[$i]}"
            module_name="${module_names[$i]}"
            module_id="${module_path//\//-}"

            src_dir="$module_path/target/javadoc-delombok"
            if [[ ! -f "$src_dir/index.html" ]]; then
              echo "Missing javadocs for $module_path at $src_dir" >&2
              exit 1
            fi

            cp -R "$src_dir" "$out_dir/$module_id"
            printf '    <li><a href="%s/index.html">%s</a></li>\n' "$module_id" "$module_name" >> "$index_file"
          done

          cat >> "$index_file" <<'HTML'
            </ul>
          </body>
          </html>
          HTML

          echo "Local javadocs assembled at: $out_dir/index.html"

      - name: "Upload Javadocs artifact"
        uses: actions/upload-artifact@v7
        with:
          name: local-javadocs
          path: target/local-javadocs/
          retention-days: 7
