openapi: 3.1.0
info:
  title: Azure AI Foundry Models Service
  license:
    name: MIT
    url: 'https://github.com/openai/openai-openapi/blob/master/LICENSE'
  version: v1
tags:
  - name: Batch
  - name: Chat
  - name: Completions
  - name: Containers
  - name: Conversations
  - name: Evals
  - name: Files
  - name: Embeddings
  - name: Fine-tuning
  - name: Models
  - name: Realtime
  - name: Responses
  - name: Threads
  - name: Vector Stores
paths:
  /responses:
    post:
      operationId: createResponse
      description: Creates a model response.
      parameters:
        - name: api-version
          in: query
          required: false
          description: |-
            The explicit Azure AI Foundry Models API version to use for this request.
            `v1` if not otherwise specified.
          schema:
            $ref: '#/components/schemas/AzureAIFoundryModelsApiVersion'
            default: v1
      responses:
        '200':
          description: The request has succeeded.
          headers:
            apim-request-id:
              required: false
              description: A request ID used for troubleshooting purposes.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - object
                  - created_at
                  - error
                  - incomplete_details
                  - output
                  - instructions
                  - parallel_tool_calls
                  - content_filters
                properties:
                  metadata:
                    anyOf:
                      - $ref: '#/components/schemas/OpenAI.Metadata'
                      - type: 'null'
                  top_logprobs:
                    anyOf:
                      - type: integer
                      - type: 'null'
                  temperature:
                    anyOf:
                      - type: number
                      - type: 'null'
                    default: 1
                  top_p:
                    anyOf:
                      - type: number
                      - type: 'null'
                    default: 1
                  user:
                    type: string
                    description: |-
                      This field is being replaced by `safety_identifier` and `prompt_cache_key`. Use `prompt_cache_key` instead to maintain caching optimizations.
                        A stable identifier for your end-users.
                        Used to boost cache hit rates by better bucketing similar requests and  to help OpenAI detect and prevent abuse. [Learn more](https://platform.openai.com/docs/guides/safety-best-practices#safety-identifiers).
                    deprecated: true
                  safety_identifier:
                    type: string
                    description: |-
                      A stable identifier used to help detect users of your application that may be violating OpenAI's usage policies.
                        The IDs should be a string that uniquely identifies each user. We recommend hashing their username or email address, in order to avoid sending us any identifying information. [Learn more](https://platform.openai.com/docs/guides/safety-best-practices#safety-identifiers).
                  prompt_cache_key:
                    type: string
                    description: 'Used by OpenAI to cache responses for similar requests to optimize your cache hit rates. Replaces the `user` field. [Learn more](https://platform.openai.com/docs/guides/prompt-caching).'
                  prompt_cache_retention:
                    anyOf:
                      - type: string
                        enum:
                          - in-memory
                          - 24h
                      - type: 'null'
                  previous_response_id:
                    anyOf:
                      - type: string
                      - type: 'null'
                  model:
                    type: string
                    description: |-
                      Model ID used to generate the response, like `gpt-4o` or `o3`. OpenAI
                        offers a wide range of models with different capabilities, performance
                        characteristics, and price points. Refer to the [model guide](https://platform.openai.com/docs/models)
                        to browse and compare available models.
                  reasoning:
                    anyOf:
                      - $ref: '#/components/schemas/OpenAI.Reasoning'
                      - type: 'null'
                  background:
                    anyOf:
                      - type: boolean
                      - type: 'null'
                  max_output_tokens:
                    anyOf:
                      - type: integer
                      - type: 'null'
                  max_tool_calls:
                    anyOf:
                      - type: integer
                      - type: 'null'
                  text:
                    $ref: '#/components/schemas/OpenAI.ResponseTextParam'
                  tools:
                    $ref: '#/components/schemas/OpenAI.ToolsArray'
                  tool_choice:
                    $ref: '#/components/schemas/OpenAI.ToolChoiceParam'
                  prompt:
                    $ref: '#/components/schemas/OpenAI.Prompt'
                  truncation:
                    anyOf:
                      - type: string
                        enum:
                          - auto
                          - disabled
                      - type: 'null'
                    default: disabled
                  id:
                    type: string
                    description: Unique identifier for this Response.
                  object:
                    type: string
                    enum:
                      - response
                    description: The object type of this resource - always set to `response`.
                    x-stainless-const: true
                  status:
                    type: string
                    enum:
                      - completed
                      - failed
                      - in_progress
                      - cancelled
                      - queued
                      - incomplete
                    description: |-
                      The status of the response generation. One of `completed`, `failed`,
                        `in_progress`, `cancelled`, `queued`, or `incomplete`.
                  created_at:
                    type: integer
                    format: unixtime
                    description: Unix timestamp (in seconds) of when this Response was created.
                  completed_at:
                    anyOf:
                      - type: string
                        format: date-time
                      - type: 'null'
                    type: integer
                    format: unixTimestamp
                  error:
                    anyOf:
                      - $ref: '#/components/schemas/OpenAI.ResponseError'
                      - type: 'null'
                  incomplete_details:
                    anyOf:
                      - $ref: '#/components/schemas/OpenAI.ResponseIncompleteDetails'
                      - type: 'null'
                  output:
                    type: array
                    items:
                      $ref: '#/components/schemas/OpenAI.OutputItem'
                    description: |-
                      An array of content items generated by the model.
                        - The length and order of items in the `output` array is dependent
                        on the model's response.
                        - Rather than accessing the first item in the `output` array and
                        assuming it's an `assistant` message with the content generated by
                        the model, you might consider using the `output_text` property where
                        supported in SDKs.
                  instructions:
                    anyOf:
                      - type: string
                      - type: array
                        items:
                          $ref: '#/components/schemas/OpenAI.InputItem'
                      - type: 'null'
                  output_text:
                    anyOf:
                      - type: string
                      - type: 'null'
                    x-stainless-skip: true
                  usage:
                    $ref: '#/components/schemas/OpenAI.ResponseUsage'
                  parallel_tool_calls:
                    type: boolean
                    description: Whether to allow the model to run tool calls in parallel.
                    default: true
                  conversation:
                    anyOf:
                      - $ref: '#/components/schemas/OpenAI.ConversationReference'
                      - type: 'null'
                  content_filters:
                    type: array
                    items:
                      $ref: '#/components/schemas/AzureContentFilterForResponsesAPI'
                    description: The content filter results from RAI.
            text/event-stream:
              itemSchema:
                type: object
                properties:
                  event:
                    type: string
                  data:
                    type: string
                required:
                  - event
                oneOf:
                  - properties:
                      data:
                        contentMediaType: application/json
                        contentSchema:
                          $ref: '#/components/schemas/OpenAI.ResponseAudioDeltaEvent'
                      event:
                        const: response.audio.delta
                  - properties:
                      data:
                        contentMediaType: application/json
                        contentSchema:
