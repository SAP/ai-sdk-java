  '/responses/{response_id}/cancel':
    post:
      operationId: cancelResponse
      description: Cancels a model response with the given ID. Only responses created with the background parameter set to true can be cancelled.
      parameters:
        - name: api-version
          in: query
          required: false
          description: |-
            The explicit Azure AI Foundry Models API version to use for this request.
            `v1` if not otherwise specified.
